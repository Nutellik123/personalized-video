<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Персональное видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #021a19, #03312e, #064e47);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: rgba(2, 254, 247, .06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(2, 254, 247, .2);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5),
                        0 0 40px rgba(2, 254, 247, .08);
            position: relative;
            z-index: 1;
            animation: cardAppear .8s ease-out;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 100px; height: 100px;
            margin: 0 auto 16px;
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(2,254,247,.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(2,254,247,.5)); }
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #02FEF7;
            text-shadow: 0 0 20px rgba(2, 254, 247, .3);
        }

        .sub {
            font-size: 14px;
            color: rgba(2, 254, 247, .5);
            margin-bottom: 32px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(2, 254, 247, .7);
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(2, 254, 247, .25);
            border-radius: 12px;
            background: rgba(2, 254, 247, .06);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: .3s;
            margin-bottom: 4px;
        }
        input:focus {
            border-color: #02FEF7;
            box-shadow: 0 0 20px rgba(2, 254, 247, .25);
        }
        input::placeholder { color: rgba(2, 254, 247, .25); }
        input.invalid {
            border-color: #f87171;
            box-shadow: 0 0 15px rgba(248, 113, 113, .3);
        }

        .char-counter {
            text-align: right;
            font-size: 12px;
            color: rgba(2, 254, 247, .35);
            margin-bottom: 20px;
            transition: .3s;
        }
        .char-counter.over { color: #f87171; font-weight: 600; }

        .limit-warning {
            font-size: 13px;
            color: #f87171;
            margin-bottom: 16px;
            display: none;
        }
        .limit-warning.visible { display: block; }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            letter-spacing: .5px;
            color: #021a19;
        }
        .btn-primary {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,.15), transparent);
            transform: rotate(45deg) translateX(-100%);
            transition: .6s;
        }
        .btn-primary:hover::after {
            transform: rotate(45deg) translateX(100%);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(2, 254, 247, .35);
        }
        .btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .err {
            color: #f87171;
            font-size: 14px;
            margin-top: 12px;
            animation: shake .5s;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="card">
    <div class="logo">
        <img src="/assets/monkey.png" alt="logo">
    </div>
    <h1>Как тебя зовут, игрок?</h1>
    <p class="sub">Введи свое имя и получи уникальный ролик</p>

    <form id="frm" action="/processing" method="GET">
        <label for="name">Твое имя</label>
        <input type="text" id="name" name="name"
               placeholder="Например: Александр"
               required autocomplete="off">
        <div class="char-counter" id="counter">0 / 21</div>
        <div class="limit-warning" id="warning">⚠ Максимум 21 символ</div>
        <button type="submit" class="btn btn-primary" id="submitBtn">
            Вернуться в игру ✨
        </button>
    </form>
    <p class="err" id="err" style="display:none"></p>
</div>

<script>
// === Частицы на Canvas ===
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 40;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = 1.5 + Math.random() * 3;
        this.speedY = -(0.3 + Math.random() * 0.8);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = 0;
        this.maxOpacity = 0.15 + Math.random() * 0.35;
        this.fadeIn = true;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.fadeIn) {
            this.opacity += 0.008;
            if (this.opacity >= this.maxOpacity) this.fadeIn = false;
        }
        if (this.y < canvas.height * 0.2) {
            this.opacity -= 0.005;
        }
        if (this.opacity <= 0 || this.y < -20) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(2, 254, 247, ${this.opacity})`;
        ctx.fill();
    }
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = new Particle();
    p.y = Math.random() * canvas.height;
    p.opacity = Math.random() * 0.3;
    p.fadeIn = false;
    particles.push(p);
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// === Форма ===
const MAX_LEN = 21;
const inp = document.getElementById('name');
const btn = document.getElementById('submitBtn');
const counter = document.getElementById('counter');
const warning = document.getElementById('warning');
const err = document.getElementById('err');
const frm = document.getElementById('frm');

inp.addEventListener('input', () => {
    const len = inp.value.length;
    counter.textContent = `${len} / ${MAX_LEN}`;
    if (len > MAX_LEN) {
        counter.classList.add('over');
        warning.classList.add('visible');
        inp.classList.add('invalid');
        btn.disabled = true;
    } else {
        counter.classList.remove('over');
        warning.classList.remove('visible');
        inp.classList.remove('invalid');
        btn.disabled = false;
    }
});

frm.addEventListener('submit', (e) => {
    const n = inp.value.trim();
    if (!n) {
        e.preventDefault();
        err.textContent = 'Введите имя';
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
        return;
    }
    if (n.length > MAX_LEN) {
        e.preventDefault();
        return;
    }
});

inp.focus();
</script>
</body>
</html>

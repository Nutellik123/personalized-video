<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#021a19">
    <meta name="color-scheme" content="dark">
    <title>Просмотр видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: auto;
            background: #021a19;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #021a19, #03312e, #064e47);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            padding: 16px;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: rgba(3, 49, 46, 0.85);
            border: 1px solid rgba(2, 254, 247, .2);
            border-radius: 24px;
            padding: 24px 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5),
                        0 0 40px rgba(2, 254, 247, .08);
            position: relative;
            z-index: 1;
            animation: cardAppear .8s ease-out;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-size: 22px;
            margin-bottom: 16px;
            color: #02FEF7;
            text-shadow: 0 0 20px rgba(2, 254, 247, .3);
        }

        .video-container {
            width: 100%;
            aspect-ratio: 9 / 16;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(2, 254, 247, .2);
            margin-bottom: 16px;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            letter-spacing: .5px;
            color: #021a19;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            -webkit-appearance: none;
        }
        .btn-green {
            background: linear-gradient(135deg, #02FEF7, #00e6a0);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(2, 254, 247, .35);
        }

        .links {
            margin-top: 16px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .links a {
            color: rgba(2, 254, 247, .4);
            font-size: 13px;
            text-decoration: underline;
        }
        .links a:hover { color: #02FEF7; }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="card">
    <h1>🎬 Ваше видео</h1>

    <div class="video-container">
        <video controls autoplay playsinline>
            <source src="{{ video_url }}" type="video/mp4">
        </video>
    </div>

    <a href="{{ video_url }}" class="btn btn-green" download>📥 Скачать видео</a>

    <div class="links">
        <a href="/">← Создать ещё</a>
    </div>
</div>

<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = 1.5 + Math.random() * 3;
        this.speedY = -(0.3 + Math.random() * 0.8);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = 0;
        this.maxOpacity = 0.15 + Math.random() * 0.35;
        this.fadeIn = true;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.fadeIn) {
            this.opacity += 0.008;
            if (this.opacity >= this.maxOpacity) this.fadeIn = false;
        }
        if (this.y < canvas.height * 0.2) this.opacity -= 0.005;
        if (this.opacity <= 0 || this.y < -20) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(2, 254, 247, ${this.opacity})`;
        ctx.fill();
    }
}

for (let i = 0; i < 40; i++) {
    const p = new Particle();
    p.y = Math.random() * canvas.height;
    p.opacity = Math.random() * 0.3;
    p.fadeIn = false;
    particles.push(p);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>

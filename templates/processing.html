<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#021a19">
    <meta name="color-scheme" content="dark">
    <title>Создаём вселенную</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background: #021a19;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* ─── Фон с частицами ─── */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #021a19, #03312e, #064e47);
            z-index: 0;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ─── Экраны ─── */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            z-index: 10;
        }
        .screen.active { display: flex; }

        /* ─── Экран загрузки ─── */
        .screen-loading {
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(3, 49, 46, 0.85);
            border: 1px solid rgba(2, 254, 247, .2);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5),
                        0 0 40px rgba(2, 254, 247, .08);
            position: relative;
            z-index: 2;
            animation: cardAppear .8s ease-out;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 100px; height: 100px;
            margin: 0 auto 16px;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #02FEF7;
            text-shadow: 0 0 20px rgba(2, 254, 247, .3);
        }

        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(2, 254, 247, .15);
            border-top-color: #02FEF7;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 24px auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bar {
            width: 100%;
            height: 6px;
            background: rgba(2, 254, 247, .1);
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #02FEF7, #00c9b7);
            width: 0;
            transition: width .5s ease;
        }

        .loading-text {
            font-size: 14px;
            color: rgba(2, 254, 247, .6);
            margin-top: 12px;
        }
        .loading-text strong { color: #02FEF7; }

        .status-text {
            font-size: 13px;
            color: rgba(2, 254, 247, .4);
            margin-top: 8px;
        }

        /* ─── Экран результата ─── */
        .screen-result {
            align-items: center;
            justify-content: center;
        }

        .result-card {
            background: rgba(3, 49, 46, 0.85);
            border: 1px solid rgba(2, 254, 247, .2);
            border-radius: 24px;
            padding: 36px 28px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5),
                        0 0 40px rgba(2, 254, 247, .08);
            position: relative;
            z-index: 2;
            animation: cardAppear .6s ease-out;
        }

        .result-name {
            color: #02FEF7;
            font-size: 18px;
            margin: 8px 0 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 10px;
            -webkit-appearance: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(2, 254, 247, .35);
        }
        .btn-watch {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            color: #021a19;
        }
        .btn-download {
            background: rgba(2, 254, 247, .12);
            color: #02FEF7;
            border: 1px solid rgba(2, 254, 247, .25);
        }
        .btn-again {
            background: transparent;
            color: rgba(2, 254, 247, .4);
            font-size: 13px;
            margin-top: 16px;
        }
        .btn-again:hover {
            color: #02FEF7;
            box-shadow: none;
            transform: none;
        }

        /* ─── Экран плеера ─── */
        .screen-player {
            flex-direction: column;
            background: #000;
        }

        .player-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .player-controls {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: #000;
            flex-shrink: 0;
        }

        .pbtn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: .3s;
            -webkit-appearance: none;
        }
        .pbtn-dl {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            color: #021a19;
        }
        .pbtn-back {
            background: rgba(2, 254, 247, .12);
            color: #02FEF7;
            border: 1px solid rgba(2, 254, 247, .25);
        }

        /* ─── Экран ошибки ─── */
        .screen-error {
            align-items: center;
            justify-content: center;
        }

        .err { color: #f87171; font-size: 14px; margin-top: 12px; }

        .success-icon {
            font-size: 56px;
            margin-bottom: 8px;
            animation: popIn .5s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<canvas id="particleCanvas"></canvas>

<!-- ═══ ЭКРАН 1: Загрузка ═══ -->
<div id="screen-loading" class="screen screen-loading active">
    <div class="card">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <h1>Создаём твою вселенную</h1>
        <div class="spinner"></div>
        <p class="loading-text">Переносим игрока <strong>"<span id="l-name"></span>"</strong> в новую вселенную</p>
        <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
        <p class="status-text" id="status-text">Подготовка...</p>
    </div>
</div>

<!-- ═══ ЭКРАН 2: Результат ═══ -->
<div id="screen-result" class="screen screen-result">
    <div class="result-card">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <div class="success-icon">🎮</div>
        <h1>Вселенная готова!</h1>
        <p class="result-name" id="d-name"></p>
        <button class="btn btn-watch" id="watchBtn">Смотреть видео</button>
        <a class="btn btn-download" id="dlBtn" href="#" download>Скачать видео</a>
        <a href="/" class="btn btn-again">← Попробовать ещё раз</a>
    </div>
</div>

<!-- ═══ ЭКРАН 3: Плеер ═══ -->
<div id="screen-player" class="screen screen-player">
    <div class="player-area">
        <video id="player" playsinline muted loop>
            <source id="videoSrc" src="" type="video/mp4">
        </video>
    </div>
    <div class="player-controls">
        <a id="player-dl" href="#" download class="pbtn pbtn-dl">Скачать</a>
        <button id="player-back" class="pbtn pbtn-back">Назад</button>
    </div>
</div>

<!-- ═══ ЭКРАН 4: Ошибка ═══ -->
<div id="screen-error" class="screen screen-error">
    <div class="card">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <h1 style="color:#f87171">Ошибка</h1>
        <p class="err" id="err-msg"></p>
        <a href="/" class="btn btn-watch" style="margin-top:20px">← Попробовать снова</a>
    </div>
</div>

<script>
// ─── Частицы ───
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 40;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = 1.5 + Math.random() * 3;
        this.speedY = -(0.3 + Math.random() * 0.8);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = 0;
        this.maxOpacity = 0.15 + Math.random() * 0.35;
        this.fadeIn = true;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.fadeIn) {
            this.opacity += 0.008;
            if (this.opacity >= this.maxOpacity) this.fadeIn = false;
        }
        if (this.y < canvas.height * 0.2) this.opacity -= 0.005;
        if (this.opacity <= 0 || this.y < -20) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(2, 254, 247, ${this.opacity})`;
        ctx.fill();
    }
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = new Particle();
    p.y = Math.random() * canvas.height;
    p.opacity = Math.random() * 0.3;
    p.fadeIn = false;
    particles.push(p);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

// ─── Управление экранами ───
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    // Скрываем/показываем фон
    const bgLayer = document.querySelector('.bg-layer');
    const particleCanvas = document.getElementById('particleCanvas');
    if (id === 'screen-player') {
        bgLayer.style.display = 'none';
        particleCanvas.style.display = 'none';
    } else {
        bgLayer.style.display = 'block';
        particleCanvas.style.display = 'block';
    }
}

// ─── Переменные ───
let downloadUrl = '';
let videoUrl = '';

const params = new URLSearchParams(window.location.search);
const name = params.get('name');

if (!name || !name.trim()) {
    window.location.href = '/';
} else {
    document.getElementById('l-name').textContent = name;
    document.getElementById('d-name').textContent = name;
    startGeneration(name.trim());
}

// ─── Генерация ───
async function startGeneration(name) {
    const barFill = document.getElementById('bar-fill');
    const statusText = document.getElementById('status-text');

    const stages = [
        { pct: 10, text: 'Загрузка ресурсов...', delay: 400 },
        { pct: 25, text: 'Компиляция видео...', delay: 1500 },
        { pct: 45, text: 'Создание вселенной...', delay: 3000 },
        { pct: 65, text: 'Погружение...', delay: 5000 },
        { pct: 85, text: 'Вход во вселенную...', delay: 8000 },
    ];

    stages.forEach(s => {
        setTimeout(() => {
            barFill.style.width = s.pct + '%';
            statusText.textContent = s.text;
        }, s.delay);
    });

    try {
        const fd = new FormData();
        fd.append('name', name);

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 120000);

        const r = await fetch('/generate', { method: 'POST', body: fd, signal: controller.signal });
        clearTimeout(timeout);

        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Ошибка сервера');

        barFill.style.width = '100%';
        statusText.textContent = 'Готово!';

        downloadUrl = d.download_url;
        videoUrl = d.download_url;

        document.getElementById('dlBtn').href = downloadUrl;
        document.getElementById('player-dl').href = downloadUrl;
        document.getElementById('videoSrc').src = videoUrl;

        setTimeout(() => showScreen('screen-result'), 500);

    } catch (e) {
        document.getElementById('err-msg').textContent =
            e.name === 'AbortError' ? 'Превышено время ожидания.' : e.message;
        showScreen('screen-error');
    }
}

// ─── Кнопки ───
document.getElementById('watchBtn').addEventListener('click', () => {
    showScreen('screen-player');
    const vid = document.getElementById('player');
    vid.load();
    vid.play().catch(() => {});
});

document.getElementById('player-back').addEventListener('click', () => {
    const vid = document.getElementById('player');
    vid.pause();
    showScreen('screen-result');
});

document.getElementById('player').addEventListener('click', function() {
    this.muted = !this.muted;
});
</script>
</body>
</html>

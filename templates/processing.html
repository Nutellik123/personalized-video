<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#021a19">
    <meta name="color-scheme" content="dark">
    <title>Генерация видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background: #021a19;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #021a19, #03312e, #064e47);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: rgba(3, 49, 46, 0.85);
            border: 1px solid rgba(2, 254, 247, .2);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5),
                        0 0 40px rgba(2, 254, 247, .08);
            position: relative;
            z-index: 1;
            animation: cardAppear .8s ease-out;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 100px; height: 100px;
            margin: 0 auto 16px;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #02FEF7;
            text-shadow: 0 0 20px rgba(2, 254, 247, .3);
        }

        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(2, 254, 247, .15);
            border-top-color: #02FEF7;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 24px auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bar {
            width: 100%;
            height: 6px;
            background: rgba(2, 254, 247, .1);
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #02FEF7, #00c9b7);
            width: 0;
            transition: width .5s ease;
        }

        .loading-text {
            font-size: 14px;
            color: rgba(2, 254, 247, .6);
            margin-top: 12px;
        }
        .loading-text strong { color: #02FEF7; }

        .status-text {
            font-size: 13px;
            color: rgba(2, 254, 247, .4);
            margin-top: 8px;
        }

        .state { display: none; }
        .state.active { display: block; }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            letter-spacing: .5px;
            color: #021a19;
            text-decoration: none;
            display: block;
            margin-top: 12px;
            -webkit-appearance: none;
        }
        .btn-green {
            background: linear-gradient(135deg, #02FEF7, #00e6a0);
        }
        .btn-watch {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(2, 254, 247, .35);
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 8px;
            animation: popIn .5s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .again {
            display: inline-block;
            margin-top: 20px;
            color: rgba(2, 254, 247, .4);
            font-size: 13px;
            text-decoration: underline;
        }
        .again:hover { color: #02FEF7; }

        .err { color: #f87171; font-size: 14px; margin-top: 12px; }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="card">
    <div id="s-load" class="state active">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <h1>Создаём видео</h1>
        <div class="spinner"></div>
        <p class="loading-text">Генерируем ролик для <strong id="l-name"></strong></p>
        <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
        <p class="status-text" id="status-text">Подготовка...</p>
    </div>

    <div id="s-done" class="state">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <div class="success-icon">🎬</div>
        <h1>Видео готово!</h1>
        <p style="color:#02FEF7; font-size:18px; margin:8px 0" id="d-name"></p>
        <a id="watchBtn" href="#" class="btn btn-watch">▶ Смотреть видео</a>
        <a id="dl" href="#" class="btn btn-green" download>📥 Скачать видео</a>
        <div><a href="/" class="again">← Создать ещё одно</a></div>
    </div>

    <div id="s-err" class="state">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <h1 style="color:#f87171">Ошибка</h1>
        <p class="err" id="err-msg"></p>
        <div style="margin-top:20px"><a href="/" class="btn btn-green">← Попробовать снова</a></div>
    </div>
</div>

<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 40;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = 1.5 + Math.random() * 3;
        this.speedY = -(0.3 + Math.random() * 0.8);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = 0;
        this.maxOpacity = 0.15 + Math.random() * 0.35;
        this.fadeIn = true;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.fadeIn) {
            this.opacity += 0.008;
            if (this.opacity >= this.maxOpacity) this.fadeIn = false;
        }
        if (this.y < canvas.height * 0.2) this.opacity -= 0.005;
        if (this.opacity <= 0 || this.y < -20) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(2, 254, 247, ${this.opacity})`;
        ctx.fill();
    }
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = new Particle();
    p.y = Math.random() * canvas.height;
    p.opacity = Math.random() * 0.3;
    p.fadeIn = false;
    particles.push(p);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

const sL = document.getElementById('s-load');
const sD = document.getElementById('s-done');
const sE = document.getElementById('s-err');
const barFill = document.getElementById('bar-fill');
const statusText = document.getElementById('status-text');

function show(s) {
    [sL, sD, sE].forEach(e => e.classList.remove('active'));
    s.classList.add('active');
}

const params = new URLSearchParams(window.location.search);
const name = params.get('name');

if (!name || !name.trim()) {
    window.location.href = '/';
} else {
    document.getElementById('l-name').textContent = name;
    document.getElementById('d-name').textContent = name;
    startGeneration(name.trim());
}

async function startGeneration(name) {
    const stages = [
        { pct: 15, text: 'Загрузка ресурсов...', delay: 500 },
        { pct: 30, text: 'Обработка видео...', delay: 1500 },
        { pct: 55, text: 'Наложение текста...', delay: 3000 },
        { pct: 75, text: 'Рендеринг...', delay: 5000 },
        { pct: 90, text: 'Почти готово...', delay: 8000 },
    ];

    stages.forEach(s => {
        setTimeout(() => {
            barFill.style.width = s.pct + '%';
            statusText.textContent = s.text;
        }, s.delay);
    });

    try {
        const fd = new FormData();
        fd.append('name', name);

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 120000);

        const r = await fetch('/generate', { method: 'POST', body: fd, signal: controller.signal });
        clearTimeout(timeout);

        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Ошибка сервера');

        barFill.style.width = '100%';
        statusText.textContent = 'Готово!';

        setTimeout(() => {
            document.getElementById('dl').href = d.download_url;
            document.getElementById('watchBtn').href = d.watch_url;
            show(sD);
        }, 500);
    } catch (e) {
        document.getElementById('err-msg').textContent =
            e.name === 'AbortError' ? 'Превышено время ожидания.' : e.message;
        show(sE);
    }
}
</script>
</body>
</html>

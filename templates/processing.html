<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#021a19">
    <meta name="color-scheme" content="dark">
    <title>Создаём вселенную</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background: #021a19;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ─── Экраны ─── */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            z-index: 10;
        }
        .screen.active { display: flex; }

        /* ─── ЭКРАН ЗАГРУЗКИ ─── */
        .screen-loading {
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #021a19, #03312e, #064e47);
        }

        .card {
            background: rgba(3, 49, 46, 0.85);
            border: 1px solid rgba(2, 254, 247, .2);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5),
                        0 0 40px rgba(2, 254, 247, .08);
            animation: cardAppear .8s ease-out;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 100px; height: 100px;
            margin: 0 auto 16px;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #02FEF7;
            text-shadow: 0 0 20px rgba(2, 254, 247, .3);
        }

        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(2, 254, 247, .15);
            border-top-color: #02FEF7;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 24px auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .bar {
            width: 100%;
            height: 6px;
            background: rgba(2, 254, 247, .1);
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, #02FEF7, #00c9b7);
            width: 0;
            transition: width .5s ease;
        }

        .loading-text {
            font-size: 14px;
            color: rgba(2, 254, 247, .6);
            margin-top: 12px;
        }
        .loading-text strong { color: #02FEF7; }

        .status-text {
            font-size: 13px;
            color: rgba(2, 254, 247, .4);
            margin-top: 8px;
        }

        /* ─── ЭКРАН ВИДЕО ─── */
        .screen-video {
            flex-direction: column;
            background: #000;
        }

        .video-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-controls {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 30%);
            flex-shrink: 0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
        }

        .vbtn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: .3s;
            -webkit-appearance: none;
        }
        .vbtn-dl {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            color: #021a19;
        }
        .vbtn-again {
            background: rgba(2, 254, 247, .12);
            color: #02FEF7;
            border: 1px solid rgba(2, 254, 247, .25);
        }
        .vbtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 254, 247, .3);
        }

        /* ─── ЭКРАН ОШИБКИ ─── */
        .screen-error {
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #021a19, #03312e, #064e47);
        }

        .err { color: #f87171; font-size: 14px; margin-top: 12px; }

        .btn-retry {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            margin-top: 20px;
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            color: #021a19;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

<!-- ═══ ЭКРАН 1: Загрузка ═══ -->
<div id="screen-loading" class="screen screen-loading active">
    <canvas id="particleCanvas"></canvas>
    <div class="card">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <h1>Создаём твою вселенную</h1>
        <div class="spinner"></div>
        <p class="loading-text">Переносим игрока <strong>"<span id="l-name"></span>"</strong> в новую вселенную</p>
        <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
        <p class="status-text" id="status-text">Подготовка...</p>
    </div>
</div>

<!-- ═══ ЭКРАН 2: Видео ═══ -->
<div id="screen-video" class="screen screen-video">
    <div class="video-area">
        <video id="player" playsinline autoplay muted loop controls>
            <source id="videoSrc" src="" type="video/mp4">
        </video>
    </div>
    <div class="video-controls">
        <a id="dlBtn" href="#" download class="vbtn vbtn-dl">Скачать</a>
        <a href="/" class="vbtn vbtn-again">Ещё раз</a>
    </div>
</div>

<!-- ═══ ЭКРАН 3: Ошибка ═══ -->
<div id="screen-error" class="screen screen-error">
    <div class="card">
        <div class="logo"><img src="/assets/monkey.png" alt="logo"></div>
        <h1 style="color:#f87171">Ошибка</h1>
        <p class="err" id="err-msg"></p>
        <a href="/" class="btn-retry">← Попробовать снова</a>
    </div>
</div>

<script>
// ─── Частицы ───
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = 1.5 + Math.random() * 3;
        this.speedY = -(0.3 + Math.random() * 0.8);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = 0;
        this.maxOpacity = 0.15 + Math.random() * 0.35;
        this.fadeIn = true;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.fadeIn) {
            this.opacity += 0.008;
            if (this.opacity >= this.maxOpacity) this.fadeIn = false;
        }
        if (this.y < canvas.height * 0.2) this.opacity -= 0.005;
        if (this.opacity <= 0 || this.y < -20) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(2, 254, 247, ${this.opacity})`;
        ctx.fill();
    }
}

for (let i = 0; i < 40; i++) {
    const p = new Particle();
    p.y = Math.random() * canvas.height;
    p.opacity = Math.random() * 0.3;
    p.fadeIn = false;
    particles.push(p);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

// ─── Экраны ───
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ─── Старт ───
const params = new URLSearchParams(window.location.search);
const name = params.get('name');

if (!name || !name.trim()) {
    window.location.href = '/';
} else {
    document.getElementById('l-name').textContent = name;
    startGeneration(name.trim());
}

async function startGeneration(name) {
    const barFill = document.getElementById('bar-fill');
    const statusText = document.getElementById('status-text');

    const stages = [
        { pct: 10, text: 'Загрузка ресурсов...', delay: 400 },
        { pct: 25, text: 'Компиляция видео...', delay: 1500 },
        { pct: 45, text: 'Создание вселенной...', delay: 3000 },
        { pct: 65, text: 'Погружение...', delay: 5000 },
        { pct: 85, text: 'Вход во вселенную...', delay: 8000 },
    ];

    stages.forEach(s => {
        setTimeout(() => {
            barFill.style.width = s.pct + '%';
            statusText.textContent = s.text;
        }, s.delay);
    });

    try {
        const fd = new FormData();
        fd.append('name', name);

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 120000);

        const r = await fetch('/generate', { method: 'POST', body: fd, signal: controller.signal });
        clearTimeout(timeout);

        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Ошибка сервера');

        barFill.style.width = '100%';
        statusText.textContent = 'Готово!';

        // Подставляем видео
        document.getElementById('videoSrc').src = d.download_url;
        document.getElementById('dlBtn').href = d.download_url;

        const vid = document.getElementById('player');
        vid.load();

        setTimeout(() => {
            showScreen('screen-video');
            vid.play().catch(() => {});
        }, 500);

    } catch (e) {
        document.getElementById('err-msg').textContent =
            e.name === 'AbortError' ? 'Превышено время ожидания.' : e.message;
        showScreen('screen-error');
    }
}

// Тап по видео — вкл/выкл звук
document.getElementById('player').addEventListener('click', function(e) {
    if (e.target === this) {
        this.muted = !this.muted;
    }
});
</script>
</body>
</html>

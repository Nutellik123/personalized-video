<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#021a19">
    <meta name="color-scheme" content="dark">
    <title>Персональное видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background: #021a19;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #021a19, #03312e, #064e47);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: rgba(3, 49, 46, 0.85);
            border: 1px solid rgba(2, 254, 247, .2);
            border-radius: 24px;
            padding: 40px 28px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5),
                        0 0 40px rgba(2, 254, 247, .08);
            position: relative;
            z-index: 1;
            animation: cardAppear .8s ease-out;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 90px; height: 90px;
            margin: 0 auto 12px;
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(2,254,247,.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(2,254,247,.5)); }
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }

        h1 {
            font-size: 22px;
            margin-bottom: 6px;
            color: #02FEF7;
            text-shadow: 0 0 20px rgba(2, 254, 247, .3);
        }

        .sub {
            font-size: 13px;
            color: rgba(2, 254, 247, .5);
            margin-bottom: 24px;
        }

        /* Steps */
        .step { display: none; animation: fadeIn .4s ease-out; }
        .step.active { display: block; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Progress dots */
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(2, 254, 247, .15);
            transition: .3s;
        }
        .dot.done { background: #02FEF7; box-shadow: 0 0 8px rgba(2,254,247,.4); }
        .dot.current { background: rgba(2, 254, 247, .5); box-shadow: 0 0 6px rgba(2,254,247,.3); }

        .question-title {
            font-size: 16px;
            color: #02FEF7;
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* Name input */
        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(2, 254, 247, .7);
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(2, 254, 247, .25);
            border-radius: 12px;
            background: rgba(2, 254, 247, .06);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: .3s;
            margin-bottom: 4px;
            -webkit-appearance: none;
        }
        input:focus {
            border-color: #02FEF7;
            box-shadow: 0 0 20px rgba(2, 254, 247, .25);
        }
        input::placeholder { color: rgba(2, 254, 247, .25); }
        input.invalid {
            border-color: #f87171;
            box-shadow: 0 0 15px rgba(248, 113, 113, .3);
        }

        .char-counter {
            text-align: right;
            font-size: 12px;
            color: rgba(2, 254, 247, .35);
            margin-bottom: 16px;
            transition: .3s;
        }
        .char-counter.over { color: #f87171; font-weight: 600; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            letter-spacing: .5px;
            color: #021a19;
            -webkit-appearance: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,.15), transparent);
            transform: rotate(45deg) translateX(-100%);
            transition: .6s;
        }
        .btn-primary:hover::after { transform: rotate(45deg) translateX(100%); }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(2, 254, 247, .35);
        }
        .btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Quiz option buttons */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .opt-btn {
            background: rgba(2, 254, 247, .06);
            border: 2px solid rgba(2, 254, 247, .2);
            border-radius: 16px;
            padding: 16px 10px;
            cursor: pointer;
            transition: .3s;
            text-align: center;
            color: #fff;
        }
        .opt-btn:hover {
            border-color: rgba(2, 254, 247, .5);
            background: rgba(2, 254, 247, .1);
            transform: translateY(-2px);
        }
        .opt-btn.selected {
            border-color: #02FEF7;
            background: rgba(2, 254, 247, .15);
            box-shadow: 0 0 20px rgba(2, 254, 247, .2);
        }
        .opt-btn .opt-icon {
            font-size: 36px;
            margin-bottom: 8px;
            display: block;
        }
        .opt-btn .opt-label {
            font-size: 13px;
            color: rgba(2, 254, 247, .8);
            font-weight: 500;
            line-height: 1.3;
        }

        .err {
            color: #f87171;
            font-size: 14px;
            margin-top: 10px;
            animation: shake .5s;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .nav-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .nav-row .btn { flex: 1; }
        .btn-back {
            background: rgba(2, 254, 247, .1);
            color: #02FEF7;
            border: 1px solid rgba(2, 254, 247, .3);
        }
        .btn-back:hover {
            background: rgba(2, 254, 247, .2);
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="card">
    <div class="logo">
        <img src="/assets/monkey.png" alt="logo">
    </div>
    <h1>Персональное видео</h1>
    <p class="sub">Пройди викторину и получи уникальный ролик</p>

    <div class="progress-dots">
        <div class="dot current" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
    </div>

    <!-- STEP 0: Name -->
    <div class="step active" id="step0">
        <p class="question-title">Как тебя зовут?</p>
        <label for="name">Твоё имя</label>
        <input type="text" id="name" placeholder="Например: Александр" autocomplete="off">
        <div class="char-counter" id="counter">0 / 21</div>
        <button class="btn btn-primary" id="nameNext">Далее →</button>
        <p class="err" id="nameErr" style="display:none"></p>
    </div>

    <!-- STEP 1: Vibe (bg) -->
    <div class="step" id="step1">
        <p class="question-title">🌀 Твой вайб сегодня?</p>
        <div class="options" id="bgOptions">
            <div class="opt-btn" data-value="1">
                <span class="opt-icon">⚡</span>
                <span class="opt-label">Лазерный неон</span>
            </div>
            <div class="opt-btn" data-value="2">
                <span class="opt-icon">🚀</span>
                <span class="opt-label">Межгалактический шик</span>
            </div>
            <div class="opt-btn" data-value="3">
                <span class="opt-icon">🍭</span>
                <span class="opt-label">Желейный</span>
            </div>
            <div class="opt-btn" data-value="4">
                <span class="opt-icon">🖤</span>
                <span class="opt-label">Чёрный кор</span>
            </div>
        </div>
        <div class="nav-row">
            <button class="btn btn-back" id="bgBack">← Назад</button>
            <button class="btn btn-primary" id="bgNext" disabled>Далее →</button>
        </div>
        <p class="err" id="bgErr" style="display:none"></p>
    </div>

    <!-- STEP 2: Age -->
    <div class="step" id="step2">
        <p class="question-title">🪐 Сколько прожил на планете Земля?</p>
        <div class="options" id="ageOptions">
            <div class="opt-btn" data-value="1">
                <span class="opt-icon">👶</span>
                <span class="opt-label">Меньше 10 земных лет</span>
            </div>
            <div class="opt-btn" data-value="2">
                <span class="opt-icon">🧑‍🎓</span>
                <span class="opt-label">11-18 земных лет</span>
            </div>
            <div class="opt-btn" data-value="3">
                <span class="opt-icon">🧑‍💼</span>
                <span class="opt-label">18-40 земных лет</span>
            </div>
            <div class="opt-btn" data-value="4">
                <span class="opt-icon">🧙</span>
                <span class="opt-label">Больше 40 земных лет</span>
            </div>
        </div>
        <div class="nav-row">
            <button class="btn btn-back" id="ageBack">← Назад</button>
            <button class="btn btn-primary" id="ageSubmit" disabled>Создать видео ✨</button>
        </div>
        <p class="err" id="ageErr" style="display:none"></p>
    </div>
</div>

<script>
/* ── Particles ── */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = 1.5 + Math.random() * 3;
        this.speedY = -(0.3 + Math.random() * 0.8);
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = 0;
        this.maxOpacity = 0.15 + Math.random() * 0.35;
        this.fadeIn = true;
    }
    update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.fadeIn) { this.opacity += 0.008; if (this.opacity >= this.maxOpacity) this.fadeIn = false; }
        if (this.y < canvas.height * 0.2) this.opacity -= 0.005;
        if (this.opacity <= 0 || this.y < -20) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(2, 254, 247, ${this.opacity})`;
        ctx.fill();
    }
}

for (let i = 0; i < 40; i++) {
    const p = new Particle();
    p.y = Math.random() * canvas.height;
    p.opacity = Math.random() * 0.3;
    p.fadeIn = false;
    particles.push(p);
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
}
animate();

/* ── Quiz Logic ── */
const MAX_LEN = 21;
let currentStep = 0;
let selectedBg = null;
let selectedAge = null;

const steps = [document.getElementById('step0'), document.getElementById('step1'), document.getElementById('step2')];
const dots = [document.getElementById('dot0'), document.getElementById('dot1'), document.getElementById('dot2')];

const inp = document.getElementById('name');
const counter = document.getElementById('counter');

function showStep(n) {
    steps.forEach((s, i) => s.classList.toggle('active', i === n));
    dots.forEach((d, i) => {
        d.classList.remove('done', 'current');
        if (i < n) d.classList.add('done');
        else if (i === n) d.classList.add('current');
    });
    currentStep = n;
}

/* Step 0: Name */
inp.addEventListener('input', () => {
    const len = inp.value.length;
    counter.textContent = `${len} / ${MAX_LEN}`;
    counter.classList.toggle('over', len > MAX_LEN);
    inp.classList.toggle('invalid', len > MAX_LEN);
});

document.getElementById('nameNext').addEventListener('click', () => {
    const n = inp.value.trim();
    const errEl = document.getElementById('nameErr');
    if (!n) { errEl.textContent = 'Введите имя'; errEl.style.display = 'block'; return; }
    if (n.length > MAX_LEN) { errEl.textContent = `Максимум ${MAX_LEN} символов`; errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';
    showStep(1);
});

inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('nameNext').click(); }
});

/* Step 1: BG */
function setupOptions(containerId, nextBtnId, onSelect) {
    const container = document.getElementById(containerId);
    const nextBtn = document.getElementById(nextBtnId);
    container.querySelectorAll('.opt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            container.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            onSelect(btn.dataset.value);
            nextBtn.disabled = false;
        });
    });
}

setupOptions('bgOptions', 'bgNext', (val) => { selectedBg = val; });
setupOptions('ageOptions', 'ageSubmit', (val) => { selectedAge = val; });

document.getElementById('bgNext').addEventListener('click', () => {
    if (!selectedBg) return;
    showStep(2);
});

document.getElementById('bgBack').addEventListener('click', () => showStep(0));
document.getElementById('ageBack').addEventListener('click', () => showStep(1));

/* Step 2: Submit */
document.getElementById('ageSubmit').addEventListener('click', () => {
    if (!selectedAge) return;
    const name = encodeURIComponent(inp.value.trim());
    window.location.href = `/processing?name=${name}&bg=${selectedBg}&age=${selectedAge}`;
});

inp.focus();
</script>
</body>
</html>

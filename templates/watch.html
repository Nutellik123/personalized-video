<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#021a19">
    <title>Твоё видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background: #000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 440px;
            max-height: 85vh;
            aspect-ratio: 9/16;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
            background: #000;
        }

        /* ─── Плашка РЕДКИЙ ФОН ─── */
        .rare-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            animation: rareAppear 0.6s ease-out 0.5s forwards;
        }

        @keyframes rareAppear {
            0% { opacity: 0; transform: scale(0.5); }
            60% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .rare-banner {
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00, #FFD700);
            background-size: 300% 300%;
            animation: rareGradient 3s ease infinite, rarePulse 2s ease-in-out infinite;
            border-radius: 16px;
            padding: 24px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(255, 215, 0, 0.6),
                0 0 60px rgba(255, 165, 0, 0.3),
                0 0 100px rgba(255, 140, 0, 0.15),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
        }

        @keyframes rareGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes rarePulse {
            0%, 100% {
                box-shadow:
                    0 0 30px rgba(255, 215, 0, 0.6),
                    0 0 60px rgba(255, 165, 0, 0.3),
                    0 0 100px rgba(255, 140, 0, 0.15);
            }
            50% {
                box-shadow:
                    0 0 50px rgba(255, 215, 0, 0.8),
                    0 0 90px rgba(255, 165, 0, 0.5),
                    0 0 140px rgba(255, 140, 0, 0.25);
            }
        }

        /* Свечение-блик */
        .rare-banner::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.2) 45%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0.2) 55%,
                transparent 70%
            );
            animation: rareShine 3s ease-in-out infinite;
        }

        @keyframes rareShine {
            0% { transform: rotate(45deg) translateX(-150%); }
            100% { transform: rotate(45deg) translateX(150%); }
        }

        /* Частицы-искры */
        .rare-banner::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 18px;
            border: 2px solid rgba(255, 215, 0, 0.5);
            animation: rareBorder 2s ease-in-out infinite;
        }

        @keyframes rareBorder {
            0%, 100% { border-color: rgba(255, 215, 0, 0.5); }
            50% { border-color: rgba(255, 215, 0, 1); }
        }

        .rare-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: rgba(100, 60, 0, 0.8);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }

        .rare-percent {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: #4a2800;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        .rare-fade {
            animation: rareFadeOut 0.5s ease-in 4s forwards;
        }

        @keyframes rareFadeOut {
            to { opacity: 0; }
        }

        /* ─── Кнопки ─── */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            width: 100%;
            max-width: 440px;
            padding: 0 4px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: .3s;
            -webkit-appearance: none;
        }
        .btn-dl {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            color: #021a19;
        }
        .btn-back {
            background: rgba(2, 254, 247, .12);
            color: #02FEF7;
            border: 1px solid rgba(2, 254, 247, .25);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 254, 247, .3);
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <video id="player" playsinline autoplay muted loop>
        <source src="{{ video_url }}" type="video/mp4">
    </video>

    {% if is_rare %}
    <div class="rare-overlay rare-fade" id="rareOverlay">
        <div class="rare-banner">
            <div class="rare-label">Редкость</div>
            <div class="rare-percent">{{ rarity_percent }}%</div>
        </div>
    </div>
    {% endif %}
</div>

<div class="controls">
    <a href="{{ video_url }}" download class="btn btn-dl">Скачать</a>
    <a href="/" class="btn btn-back">Ещё раз</a>
</div>

<script>
const vid = document.getElementById('player');
vid.play().catch(() => {});
vid.addEventListener('click', () => {
    vid.muted = !vid.muted;
});

// Редкая плашка исчезает через 4.5 секунд
const rare = document.getElementById('rareOverlay');
if (rare) {
    setTimeout(() => {
        rare.style.pointerEvents = 'none';
    }, 4500);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Твоё видео</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            background: #000;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            z-index: 10;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: .3s;
            -webkit-appearance: none;
        }
        .btn-dl {
            background: linear-gradient(135deg, #02FEF7, #00c9b7);
            color: #021a19;
        }
        .btn-back {
            background: rgba(2, 254, 247, .12);
            color: #02FEF7;
            border: 1px solid rgba(2, 254, 247, .25);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 254, 247, .3);
        }
    </style>
</head>
<body>

<video id="player" playsinline autoplay muted loop>
    <source src="{{ video_url }}" type="video/mp4">
</video>

<div class="controls">
    <a href="{{ video_url }}" download class="btn btn-dl">Скачать</a>
    <a href="/" class="btn btn-back">Ещё раз</a>
</div>

<script>
const vid = document.getElementById('player');
vid.play().catch(() => {});
vid.addEventListener('click', () => {
    vid.muted = !vid.muted;
});
</script>
</body>
</html>
